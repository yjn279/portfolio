name: Claude Code

on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        required: true
        description: "Prompt"

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(biome ci),Bash(biome ci .),Bash(pnpm install),Bash(pnpm build),Bash(pnpm check:fix)"
          assignee_trigger: "claude"
          direct_prompt: ${{ inputs.prompt }}
